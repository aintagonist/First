
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Protected Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    input {
      padding: 10px;
      border-radius: 6px;
      border: none;
      margin-top: 10px;
      width: 200px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }

    #content {
      display: none;
      margin-top: 20px;
    }

    .error {
      color: #f87171;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Enter Password</h2>
  <input type="password" id="password" placeholder="Password">
  <br>
  <button onclick="checkPassword()">Unlock</button>
  <p class="error" id="error"></p>

  <div id="content">
    <h3>🔓 Access Granted</h3>
    <p>Welcome to the hidden content.</p>
  </div>
</div>

<script>
  const correctPassword = "123";

  function checkPassword() {
    const input = document.getElementById("password").value;
    const error = document.getElementById("error");

    if (input === correctPassword) {
      document.getElementById("content").style.display = "block";
      error.textContent = "";
    } else {
      error.textContent = "Wrong password!";
    }
  }
</script>

</body>
</html>
