<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Main Page</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #0a0a0a; /* dark grayish black */
      color: white;
      font-family: Arial, sans-serif;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    .welcome-box {
      background: #111827; /* slightly lighter dark */
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    p {
      color: #9ca3af;
      font-size: 1.1rem;
    }
  </style>
</head>

<body>

  <div class="welcome-box">
    <h1>Welcome</h1>
    <p>You made it past the login.</p>
  </div>

</body>
</html>
